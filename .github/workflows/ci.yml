name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: ["1.26.5"]

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Cache Go tools
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/go/bin/golangci-lint
            ~/go/bin/gremlins
            ~/go/bin/goda
            ~/go/bin/actionlint
            ~/.cache/go-build
          key: ${{ runner.os }}-go-tools-${{ matrix.go-version }}-${{ hashFiles('scripts/setup/install-ci-tools.sh') }}
          restore-keys: |
            ${{ runner.os }}-go-tools-${{ matrix.go-version }}-

      - name: Install pinned CI tools
        run: bash scripts/setup/install-ci-tools.sh

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

      - name: Run CI checks
        env:
          CI: "true"
          GOLANGCI_LINT_TIMEOUT: "5m"
        run: ./scripts/ci/ci.sh

      - name: Check GoReleaser configuration
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: v2.17.0
          args: check

      - name: Build Docker image
        run: docker build --tag go-llm-project-structure:ci .

      - name: Generate coverage
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          version: v11.3.1
          files: ./coverage.out
          fail_ci_if_error: false
          flags: unittests
          name: codecov-${{ matrix.go-version }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ matrix.go-version }}
          path: coverage.out
          retention-days: 7

      - name: Run benchmarks
        run: go test -bench=. -benchmem ./...

      - name: Generate SBOM
        run: |
          go install github.com/anchore/syft/cmd/syft@v1.48.0
          syft . -o spdx-json > sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ matrix.go-version }}
          path: sbom.json
          retention-days: 30
