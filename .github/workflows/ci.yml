name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: ["1.26"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Cache Go tools
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin/goimports
            ~/go/bin/golangci-lint
            ~/.cache/go-build
          key: ${{ runner.os }}-go-tools-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-tools-${{ matrix.go-version }}-

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: Run CI checks
        env:
          CI: "true"
          GOLANGCI_LINT_TIMEOUT: "5m"
        run: ./scripts/ci/ci.sh

      - name: Generate coverage
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false
          flags: unittests
          name: codecov-${{ matrix.go-version }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.go-version }}
          path: coverage.out
          retention-days: 7
