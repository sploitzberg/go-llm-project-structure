# Slower `//go:build integration` tests — not in default PR CI (see README).
# Weekly + manual; use `make integration` before releases.
name: Integration

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go test (integration, race)
        run: go test -count=1 -race -tags=integration ./...
