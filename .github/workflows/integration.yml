# Slower `//go:build integration` tests — not in default PR CI (see README).
# Weekly + manual; use `task integration` before releases.
name: Integration

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install pinned CI tools
        run: bash scripts/setup/install-ci-tools.sh

      - name: Run CI checks
        env:
          CI: "true"
          GOLANGCI_LINT_TIMEOUT: "5m"
        run: ./scripts/ci/ci.sh

      - name: Run integration tests
        run: go test -count=1 -race -tags=integration ./...
