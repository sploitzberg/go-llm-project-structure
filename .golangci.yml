# .golangci.yml
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: true

linters:
  default: standard
  enable:
    - depguard
    - errorlint
    - gocritic
    - gosec
    - misspell
    - modernize
    - revive
    - whitespace
    - copyloopvar

  settings:
    depguard:
      rules:
        # Rule 1: domain/ must remain pure
        domain_pure:
          files:
            - internal/domain/**/*.go
          deny:
            - pkg:
                "github.com/sploitzberg/go-llm-project-structure/internal/(adapt\
                er|service|port)"
              desc: "domain/ must not depend on adapter, service, or port (hexagonal rule)"

        # Rule 2: service/ must not depend on adapter
        service_clean:
          files:
            - internal/service/**/*.go
          deny:
            - pkg:
                "github.com/sploitzberg/go-llm-project-structure/internal/adapte\
                r"
              desc: "service/ must not depend on adapter/ (use ports instead)"

        # Rule 3: port/ must remain clean
        port_clean:
          files:
            - internal/port/**/*.go
          deny:
            - pkg:
                "github.com/sploitzberg/go-llm-project-structure/internal/(adapt\
                er|service)"
              desc: "port/ must not depend on adapter or service"

        # Rule 4: primary adapters should be clean
        primary_adapter_clean:
          files:
            - internal/adapter/primary/**/*.go
          deny:
            - pkg:
                "github.com/sploitzberg/go-llm-project-structure/internal/(servi\
                ce|adapter/secondary)"
              desc: "primary adapters should only depend on domain and primary ports"

        # Rule 5: secondary adapters should not depend on primary adapters
        secondary_adapter_clean:
          files:
            - internal/adapter/secondary/**/*.go
          deny:
            - pkg:
                "github.com/sploitzberg/go-llm-project-structure/internal/adapte\
                r/primary"
              desc: "secondary adapters should not depend on primary adapters"

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

    revive:
      rules:
        - name: error-strings
        - name: error-return
        - name: exported

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/sploitzberg/go-llm-project-structure

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
