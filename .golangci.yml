# .golangci.yml
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: true

linters:
  default: standard
  enable:
    - depguard
    - errorlint
    - gocritic
    - gosec
    - misspell
    - modernize
    - revive
    - whitespace
    - copyloopvar
    - exhaustruct
    - forcetypeassert
    - musttag
    - nilerr
    - noctx
    - prealloc
    - unconvert
    - gocyclo
    - dupl
    - funlen
    - mnd
    - gocognit
    - gochecknoinits
    - godot
    - godox
    - gomoddirectives
    - importas
    - inamedparam
    - interfacebloat
    - nakedret
    - nestif
    - nilnil
    - nolintlint
    - tagalign
    - testableexamples
    - unparam
    - wrapcheck

  settings:
    depguard:
      rules:
        domain_pure:
          files:
            - internal/core/domain/**/*.go
            - "!$test"
          list-mode: strict
          allow:
            - $gostd

        ports_clean:
          files:
            - internal/core/ports/**/*.go
            - "!$test"
          list-mode: strict
          allow:
            - $gostd
            - github.com/sploitzberg/go-llm-project-structure/internal/core/domain

        services_clean:
          files:
            - internal/core/services/**/*.go
            - "!$test"
          list-mode: strict
          allow:
            - $gostd
            - github.com/sploitzberg/go-llm-project-structure/internal/core/domain
            - github.com/sploitzberg/go-llm-project-structure/internal/core/ports

        config_pure:
          files:
            - internal/config/**/*.go
            - "!$test"
          list-mode: strict
          allow:
            - $gostd

        primary_adapters:
          files:
            - internal/adapter/primary/**/*.go
          deny:
            - pkg: github.com/sploitzberg/go-llm-project-structure/internal/core/services
              desc: primary adapters depend on primary ports, not concrete services
            - pkg: github.com/sploitzberg/go-llm-project-structure/internal/core/ports/secondary
              desc: primary adapters must not use secondary ports
            - pkg: github.com/sploitzberg/go-llm-project-structure/internal/adapter
              desc: adapters must not depend on other adapters

        secondary_adapters:
          files:
            - internal/adapter/secondary/**/*.go
          deny:
            - pkg: github.com/sploitzberg/go-llm-project-structure/internal/core/services
              desc: secondary adapters must not use services
            - pkg: github.com/sploitzberg/go-llm-project-structure/internal/core/ports/primary
              desc: secondary adapters must not use primary ports
            - pkg: github.com/sploitzberg/go-llm-project-structure/internal/config
              desc: secondary adapters receive constructed dependencies from cmd
            - pkg: github.com/sploitzberg/go-llm-project-structure/internal/adapter
              desc: adapters must not depend on other adapters

    gocognit:
      min-complexity: 10

    gocyclo:
      min-complexity: 15

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

    godot:
      scope: toplevel
      period: true
      capital: false

    godox:
      keywords:
        - TODO
        - FIXME
        - HACK
        - XXX



    gomoddirectives:
      replace-local: true

    importas:
      alias:
        - pkg: github.com/stretchr/testify/assert
          alias: assert
        - pkg: github.com/stretchr/testify/require
          alias: require
        - pkg: context
          alias: ctx

    inamedparam:
      skip-single-param: false

    interfacebloat:
      max: 10

    nakedret:
      max-func-lines: 30

    nestif:
      min-complexity: 5

    nolintlint:
      require-explanation: true
      require-specific: true

    tagalign:
      align: true
      sort: true
      order:
        - json
        - yaml
        - xml
        - toml
        - bson
        - protobuf
        - asn

    unparam:
      check-exported: false

    revive:
      rules:
        - name: error-strings
        - name: error-return
        - name: argument-limit
          arguments: [4]

    funlen:
      lines: 60
      statements: 40

    mnd:
      checks:
        - argument
        - case
        - condition
        - operation
        - return
        - assign
      ignored-numbers:
        - "0"
        - "1"
        - "-1"
        - "2"

formatters:
  enable:
    - gofumpt
    - goimports
    - gci
  settings:
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/sploitzberg/go-llm-project-structure
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/sploitzberg/go-llm-project-structure)

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
