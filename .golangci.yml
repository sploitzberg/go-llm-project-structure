# .golangci.yml
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: true

linters:
  default: standard
  enable:
    - depguard
    - errorlint
    - gocritic
    - gosec
    - misspell
    - modernize
    - revive
    - whitespace
    - copyloopvar
    - exhaustruct
    - forcetypeassert
    - musttag
    - nilerr
    - noctx
    - prealloc
    - unconvert
    - gocyclo
    - dupl
    - funlen
    - mnd
    - gocognit
    - godot
    - godox
    - goheader
    - gomoddirectives
    - importas
    - inamedparam
    - interfacebloat
    - nakedret
    - nestif
    - nilnil
    - nolintlint
    - tagalign
    - testableexamples
    - unparam
    - wrapcheck

  settings:
    depguard:
      rules:
        # Rule 1: core/domain/ must remain pure
        domain_pure:
          files:
            - internal/core/domain/**/*.go
          deny:
            - pkg:
                "github.com/sploitzberg/go-llm-project-structure/internal/(adapt\
                er|core/services|core/ports)"
              desc: "core/domain/ must not depend on adapter, services, or ports (hexagonal rule)"

        # Rule 2: core/services/ must not depend on adapter
        service_clean:
          files:
            - internal/core/services/**/*.go
          deny:
            - pkg:
                "github.com/sploitzberg/go-llm-project-structure/internal/adapte\
                r"
              desc: "core/services/ must not depend on adapter/ (use ports instead)"

        # Rule 3: core/ports/ must remain clean
        port_clean:
          files:
            - internal/core/ports/**/*.go
          deny:
            - pkg:
                "github.com/sploitzberg/go-llm-project-structure/internal/(adapt\
                er|core/services)"
              desc: "core/ports/ must not depend on adapter or services"

        # Rule 4: primary adapters should be clean
        primary_adapter_clean:
          files:
            - internal/adapter/primary/**/*.go
          deny:
            - pkg:
                "github.com/sploitzberg/go-llm-project-structure/internal/(core/servi\
                ces|adapter/secondary)"
              desc: "primary adapters should only depend on core/domain and core/ports"

        # Rule 5: secondary adapters should not depend on primary adapters
        secondary_adapter_clean:
          files:
            - internal/adapter/secondary/**/*.go
          deny:
            - pkg:
                "github.com/sploitzberg/go-llm-project-structure/internal/adapte\
                r/primary"
              desc: "secondary adapters should not depend on primary adapters"

    gocognit:
      min-complexity: 10

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

    godot:
      scope: toplevel
      period: true
      capital: false

    godox:
      keywords:
        - TODO
        - FIXME
        - HACK
        - XXX

    goheader:
      template: |
        {{ .License }}

        {{ .Author }}

      values:
        const:
          license: Apache-2.0
          author: sploitzberg

    gomoddirectives:
      replace-local: true

    importas:
      alias:
        - pkg: github.com/stretchr/testify/assert
          alias: assert
        - pkg: github.com/stretchr/testify/require
          alias: require
        - pkg: context
          alias: ctx

    inamedparam:
      skip-single-param: false

    interfacebloat:
      max: 10

    nakedret:
      max-func-lines: 30

    nestif:
      min-complexity: 5

    nolintlint:
      require-explanation: true
      require-specific: true

    tagalign:
      align: true
      sort: true
      order:
        - json
        - yaml
        - xml
        - toml
        - bson
        - protobuf
        - asn

    unparam:
      check-exported: false

    revive:
      rules:
        - name: error-strings
        - name: error-return
        - name: argument-limit
          arguments: [4]

    funlen:
      lines: 60
      statements: 40

    mnd:
      checks:
        - argument
        - case
        - condition
        - operation
        - return
        - assign
      ignored-numbers:
        - "0"
        - "1"
        - "-1"
        - "2"

formatters:
  enable:
    - gofumpt
    - goimports
    - gci
  settings:
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/sploitzberg/go-llm-project-structure
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/sploitzberg/go-llm-project-structure)

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
