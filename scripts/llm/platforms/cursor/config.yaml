      session_id=$(echo "$input" | jq -r '.session_id // empty' 2>/dev/null || echo "")
      reason=$(echo "$input" | jq -r '.reason // empty' 2>/dev/null || echo "")
      duration_ms=$(echo "$input" | jq -r '.duration_ms // empty' 2>/dev/null || echo "")

      if [[ -n "$session_id" ]]; then
        echo "info: Session ended: $session_id (reason: $reason, duration: ${duration_ms}ms)" >&2
      fi

      exit 0

  - path: hooks/workspace-open.sh
    type: file
    content: |
      #!/usr/bin/env bash
      # Cursor workspace-open hook
      # Initializes workspace with necessary configurations

      set -euo pipefail

      ROOT="$(cd "$(dirname "$0")/../../.." && pwd)"
      cd "$ROOT"

      # Read JSON input from stdin
      input=$(cat)

      # Parse workspace info from input
      workspace_roots=$(echo "$input" | jq -r '.workspace_roots[]' 2>/dev/null || echo "")

      # Return plugin paths if any
      echo "{\"pluginPaths\": []}"

      exit 0
