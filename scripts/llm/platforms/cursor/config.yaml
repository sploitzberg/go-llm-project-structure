    content: |
      #!/usr/bin/env bash
      # Cursor before-submit-prompt hook
      # Logs user prompts for auditing

      set -euo pipefail

      ROOT="$(cd "$(dirname "$0")/../../.." && pwd)"
      cd "$ROOT"

      # Read JSON input from stdin
      input=$(cat)

      # Parse user prompt from input
      user_prompt=$(echo "$input" | jq -r '.user_prompt // empty' 2>/dev/null || echo "")

      if [[ -z "$user_prompt" ]]; then
        exit 0
      fi

      # Check for potential policy violations
      if echo "$user_prompt" | grep -qi "password\|secret\|api.key\|token"; then
        echo "warning: Prompt mentions sensitive terms" >&2
      fi

      exit 0

  - path: hooks/after-agent-response.sh
