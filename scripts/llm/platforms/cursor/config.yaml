platform: cursor
folder: .cursor

structure:
  - path: rules/
    type: dir
  - path: hooks/
    type: dir
  - path: agents/
    type: dir
  - path: skills/
    type: dir

  - path: AGENTS.md
    type: file
    content: |
      # Project Instructions

      You are a **senior Go engineer** working on a production-grade codebase that follows strict Hexagonal Architecture (Ports & Adapters). You write clean, idiomatic, testable Go. You never cut corners on architecture, security, or test quality.

      <investigate_before_answering>
      Never speculate about code you have not opened. If the user references a specific file or package, read it before answering. Investigate all relevant files BEFORE answering questions about the codebase. Never make claims about code unless you are certain — give grounded, hallucination-free answers.
      </investigate_before_answering>

      <default_to_action>
      By default, implement changes rather than only suggesting them. If the user's intent is unclear, infer the most useful likely action and proceed, using tools to discover any missing details instead of guessing.
      </default_to_action>

      <minimal_changes>
      Avoid over-engineering. Only make changes that are directly requested or clearly necessary.
      - Scope: Do not add features, refactor, or make "improvements" beyond what was asked.
      - Documentation: Do not add comments or docstrings to code you did not change.
      - Abstractions: Do not create helpers or utilities for one-time operations.
      - Defensive coding: Do not add error handling for scenarios that cannot happen.
      The right amount of complexity is the minimum needed for the current task.
      </minimal_changes>

      <action_safety>
      Take local, reversible actions freely (editing files, running tests, reading code). Confirm before taking destructive or hard-to-reverse actions: deleting files/branches, force-pushing, dropping database tables, posting to external services, or modifying shared infrastructure. Never bypass safety checks (e.g. --no-verify, --force) as a shortcut.
      </action_safety>

      <use_parallel_tool_calls>
      If you intend to call multiple tools and there are no dependencies between them, make all the independent calls in parallel. When reading multiple files, read them simultaneously. Never use placeholders or guess parameters in tool calls.
      </use_parallel_tool_calls>

      ## Your Responsibilities as an Agent

      - Strictly adhere to architectural rules, coding standards, and best practices. Never cut corners.
      - Prioritize clean, robust, maintainable, production-ready code with long-term quality.
      - Security, testability, and separation of concerns are non-negotiable.

      ---

      ## Hexagonal Architecture

      This project uses **Hexagonal Architecture** (also known as **Ports & Adapters**), originally introduced by Alistair Cockburn.

      ### Core Concepts

      - The **domain** is the heart of the application and must remain completely independent.
      - All dependencies point **inward** toward the domain.
      - External concerns (databases, HTTP, third-party APIs, etc.) are pushed to the edges as adapters.
      - The core business logic is decoupled from frameworks, databases, and delivery mechanisms.

      ### Layer Responsibilities & Rules

      - **`core/domain/`** — Pure business entities, value objects, and domain rules.
        **Must have zero dependencies** on any other internal package.

      - **`core/ports/`** — Defines clean interfaces (contracts).
        - `core/ports/primary/` → Driving ports (inbound use cases)
        - `core/ports/secondary/` → Driven ports (outbound contracts)

      - **`core/services/`** — Application services that implement use cases.
        Depends **only** on `core/domain/` and `core/ports/`.

      - **`adapter/`** — Concrete implementations of ports.
        - `adapter/primary/` → Inbound (HTTP, CLI, gRPC, etc.)
        - `adapter/secondary/` → Outbound (databases, external APIs, cache, etc.)

      - **`config/`** — Centralized configuration structures and loading.

      ### Strict Rules

      - Never import `adapter/` from `core/domain/`, `core/ports/`, or `core/services/`
      - Never import `core/services/` from `core/domain/` or `core/ports/`
      - `core/domain/` must remain pure at all times
      - All external interactions must go through ports
      - Follow `.golangci.yml` (especially `depguard` rules)

      **Security is mandatory** — see `rules/security.mdc`

      ### Full Documentation

      - Detailed layer explanations → [`internal/README.md`](internal/README.md)
      - Core architecture overview → [`internal/core/README.md`](internal/core/README.md)
      - Visual dependency graph + deeper explanation → [`docs/architecture/architecture.md`](docs/architecture/architecture.md)
      - Beginner-friendly guide with analogies → [`docs/architecture/hexagonal-architecture-simplified.md`](docs/architecture/hexagonal-architecture-simplified.md)
      - Step-by-step design flow guide → [`docs/architecture/hexagonal-design-flow.md`](docs/architecture/hexagonal-design-flow.md)

      ---

      ## Go Style & Best Practices

      This project follows **four authoritative Go style and best practice guides**. Agents and contributors should treat these as the primary sources of truth for all Go code.

      ### Authoritative References

      1. [Effective Go](https://go.dev/doc/effective_go)
      2. [Google Go Style Guide](https://google.github.io/styleguide/go/guide)
      3. [Google Go Style Decisions](https://google.github.io/styleguide/go/decisions)
      4. [Google Go Best Practices](https://google.github.io/styleguide/go/best-practices)

      ### Summary of Core Expectations

      - **Clarity & Simplicity**: Prioritize readability over cleverness. Choose the simplest solution.
      - **Consistency**: Follow `gofmt`, `goimports`, and surrounding codebase style.
      - **Naming & Comments**: `MixedCaps` for exported, `mixedCaps` for unexported. Exported identifiers need sentence comments.
      - **Error Handling**: Always check errors, wrap with `%w`, use `errors.Is`/`errors.As`.
      - **Interfaces**: Keep small and focused, named after behavior.
      - **Testing**: Table-driven with `t.Run`, maintain 80%+ coverage.
      - **Concurrency**: Use `context.Context` as first parameter when appropriate.
      - **Architecture**: Maintain strict hexagonal boundaries, keep `core/domain/` pure.

      **Precedence**: Effective Go → Google Style Guide → Style Decisions → Best Practices

      ---

      ## Testing

      This project separates unit and integration tests to maintain fast CI feedback.

      ### Test Types

      - **Unit tests** — Run on commit/PR (`task test`). Test logic in isolation with mocks.
      - **Integration tests** — Run on push (`task integration`). Add `//go:build integration` tag. Test with real dependencies.

      ### Test Guidelines

      - **Prefer table-driven tests** for multiple test cases
      - Use `t.Run` for subtests with descriptive names
      - Test file naming: `mycode_test.go` in same package as `mycode.go`
      - Exported test functions must start with `Test`
      - Maintain test coverage above 80% (configurable via `COVERAGE_THRESHOLD`)

      ### Running Tests

      ```bash
      task test                    # Unit tests
      go test -race -count=1 ./...
      task integration             # Integration tests
      go test -race -tags=integration ./...
      go test -coverprofile=coverage.out ./...  # With coverage
      ```

      ---

      ## Go Conventions Validation

      Go conventions are enforced by golangci-lint linters including godox, gochecknoinits, noctx, and others. These checks validate adherence to modern Go conventions from Effective Go and Google Style Guide (no context.Background in exported functions, no panic in production, no init functions, etc.). See `.golangci.yml` for the full list of enabled linters.

      ---

      ## CI & Quality Checks

      This project uses centralized scripts for all quality checks, ensuring consistency between local git hooks and CI pipelines.

      ### Running CI Locally

      ```bash
      # Run full CI pipeline (same as GitHub Actions)
      task ci
      # or
      ./scripts/ci/ci.sh
      ```

      ### Git Hooks

      Git hooks run automatically on commits/push. All hook logic lives in `scripts/ci/` with thin wrappers in `.githooks/`:

      - **pre-commit**: gofmt, goimports, golangci-lint, tests, hex-arch-guardrail, gosec, go-vet, secrets, license headers, file quality
      - **pre-push**: build, tests, hex-arch-guardrail, coverage, outdated dependencies
      - **commit-msg**: conventional commits format, message length
      - **pre-rebase**: protect main/master branches
      - **prepare-commit-msg**: add branch name to commit message

      ### Configuration

      Environment variables control behavior:

      - `COVERAGE_THRESHOLD` — Default 80%
      - `GOLANGCI_LINT_TIMEOUT` — Default 2m (pre-commit), 5m (CI)
      - `GO_TEST_FLAGS` — Default `-short` (pre-commit), `-race` (CI)

      ---

      ## Leveraging Go Package Documentation

      Use [pkg.go.dev](https://pkg.go.dev) for official Go package documentation. Visit `https://pkg.go.dev/<import-path>` for any package (e.g., https://pkg.go.dev/net/http). Check API docs before using unfamiliar packages to ensure idiomatic usage.

  # === Architecture Rules ===
  - path: rules/core-always.mdc
    type: file
    content: |
      ---
      description: Core Hexagonal Architecture Rules
      globs: ["**/*.go"]
      alwaysApply: true
      ---

      # Core Hexagonal Architecture Rules (Always Apply)

      - `internal/core/domain/` must have **zero** internal imports
      - `core/services/` may only depend on `core/domain/` and `core/ports/`
      - Never import from `adapter/` in core layers
      - All infrastructure belongs in `adapter/`

  - path: rules/go-best-practices.mdc
    type: file
    content: |
      ---
      description: Go coding standards
      globs: ["**/*.go"]
      alwaysApply: false
      ---

      # Go Best Practices

      <checklist>
      1. [ ] Code formatted with `gofmt -s` and `goimports`
      2. [ ] Errors wrapped with `fmt.Errorf("...: %w", err)` — never `%v`
      3. [ ] Tests fast, focused, and deterministic — no `time.Now()`, no global state
      4. [ ] No magic numbers — use named constants
      5. [ ] Functions ≤4 parameters where possible
      6. [ ] `context.Context` is first parameter where applicable
      7. [ ] Interfaces small and focused (1–3 methods ideally)
      </checklist>

      <examples>
      <example>BAD: `return fmt.Errorf("failed: %v", err)` — %v loses error chain</example>
      <example>GOOD: `return fmt.Errorf("repository find: %w", err)` — %w preserves chain</example>
      </examples>

  # === Security Rules (New) ===
  - path: rules/security.mdc
    type: file
    content: |
      ---
      description: Security Best Practices
      globs: ["**/*.go"]
      alwaysApply: true
      ---

      # Security Rules (Always Apply)

      <rules>
      1. [ ] No hardcoded credentials, API keys, or secrets — use `os.Getenv` or secure config
      2. [ ] All errors wrapped with `%w` to avoid leaking sensitive information
      3. [ ] All user input validated before use
      4. [ ] No sensitive data logged (passwords, tokens, PII)
      5. [ ] Secrets loaded from environment or secure config only
      </rules>

      <examples>
      <example>BAD: `apiKey := "sk-1234567890abcdef"` — hardcoded secret</example>
      <example>GOOD: `apiKey := os.Getenv("API_KEY"); if apiKey == "" { return ErrMissingAPIKey }`</example>
      <example>BAD: `log.Printf("User login failed: %v", err)` — may leak sensitive info</example>
      <example>GOOD: `log.Printf("Authentication failed for user %s", userID)` — sanitized logging</example>
      </examples>

  # === Hooks (Cursor Hooks) ===
  - path: hooks.json
    type: file
    content: |
      {
        "hooks": {
          "beforeReadFile": [
            {
              "command": ".cursor/hooks/before-read-file.sh",
              "matcher": {
                "file_pattern": "*.go"
              }
            }
          ],
          "beforeFileEdit": [
            {
              "command": ".cursor/hooks/before-file-edit.sh",
              "failClosed": true,
              "matcher": {
                "file_pattern": "*.go"
              }
            }
          ],
          "afterFileEdit": [
            {
              "command": ".cursor/hooks/after-file-edit.sh",
              "matcher": {
                "file_pattern": "*.go"
              }
            }
          ],
          "beforeShellExecution": [
            {
              "command": ".cursor/hooks/before-shell-execution.sh",
              "failClosed": true
            }
          ],
          "beforeSubmitPrompt": [
            {
              "command": ".cursor/hooks/before-submit-prompt.sh"
            }
          ],
          "afterAgentResponse": [
            {
              "command": ".cursor/hooks/after-agent-response.sh"
            }
          ],
          "sessionStart": [
            {
              "command": ".cursor/hooks/session-start.sh"
            }
          ]
        }
      }

  - path: hooks/before-read-file.sh
    type: file
    content: |
      #!/usr/bin/env bash
      # Pre-read hook: Minimal layer identification only
      # Verbose context injection moved to before-submit-prompt.sh

      file_path=$(echo "$1" | jq -r '.file_path // empty' 2>/dev/null || echo "")

      if [[ -z "$file_path" ]]; then
        exit 0
      fi

      if [[ "$file_path" == internal/core/domain/* ]]; then
        echo "Layer: domain"
      elif [[ "$file_path" == internal/core/ports/* ]]; then
        echo "Layer: port"
      elif [[ "$file_path" == internal/core/services/* ]]; then
        echo "Layer: service"
      elif [[ "$file_path" == internal/adapter/* ]]; then
        echo "Layer: adapter"
      elif [[ "$file_path" == internal/config/* ]]; then
        echo "Layer: config"
      fi

      exit 0

  - path: hooks/before-file-edit.sh
    type: file
    content: |
      #!/usr/bin/env bash
      # Cursor before-file-edit hook
      # Pre-write validation hook (parity with Windsurf pre_write_code)
      # Runs fast blocking linters before code is written

      set -euo pipefail

      ROOT="$(cd "$(dirname "$0")/../../.." && pwd)"
      cd "$ROOT"

      # Read JSON input from stdin
      input=$(cat)

      # Parse file path from input
      file_path=$(echo "$input" | jq -r '.file_path // empty' 2>/dev/null || echo "")

      if [[ -z "$file_path" ]]; then
        exit 0
      fi

      # Check if file is a Go file
      if [[ "$file_path" != *.go ]]; then
        exit 0
      fi

      # Block writes to protected files
      protected_files=(
        "go.mod"
        "go.sum"
        ".golangci.yml"
        "Taskfile"
      )

      for protected in "${protected_files[@]}"; do
        if [[ "$(basename "$file_path")" == "$protected" ]]; then
          echo "error: Protected file: $file_path"
          echo "This file should not be modified directly."
          echo "Use 'go mod tidy' for go.mod/go.sum instead."
          exit 2
        fi
      done

      # Check if file is in core/domain/ and would violate purity
      if [[ "$file_path" == internal/core/domain/* ]]; then
        echo "info: Writing to core/domain/ - ensure no internal dependencies"
      fi

      # Run pre-write architecture compliance check
      if [ -f "scripts/llm/hooks/pre-write-arch-compliance.sh" ]; then
        ./scripts/llm/hooks/pre-write-arch-compliance.sh "$input" 2>/dev/null || true
      fi

      # Run fast blocking linters before write (depguard, gosec, errcheck)
      # Only fast linters enabled; plain output avoids ANSI codes in LLM context
      golangci-lint run --disable-all --enable=depguard,gosec,errcheck --out-format=line-number "$file_path" 2>&1 | head -30
      lint_exit=$?

      if [[ $lint_exit -ne 0 ]]; then
        echo "error: Pre-write linter checks failed. See output above."
        echo "Fix the issues before proceeding."
        exit 2
      fi

      exit 0

  - path: hooks/after-file-edit.sh
    type: file
    content: |
      #!/usr/bin/env bash
      # Cursor after-file-edit hook
      # Formats Go files and runs quality checks after edits
      # Disables expensive linters (complexity) to keep LLM fast

      set -euo pipefail

      ROOT="$(cd "$(dirname "$0")/../../.." && pwd)"
      cd "$ROOT"

      # Read JSON input from stdin
      input=$(cat)

      # Parse file path from input
      file_path=$(echo "$input" | jq -r '.file_path // empty' 2>/dev/null || echo "")

      if [[ -z "$file_path" ]] || [[ "$file_path" != *.go ]]; then
        exit 0
      fi

      # Format Go files using golangci-lint formatters
      # Disable expensive linters (complexity, duplication) for fast LLM iteration
      golangci-lint run --fix --disable=gocyclo,gocognit,funlen,dupl,testableexamples --config .golangci.yml "$file_path" 2>/dev/null || true

      # Run fast quality checks
      go vet "$file_path" 2>/dev/null || true

      # Run architecture guardrail on the specific file
      ./scripts/ci/hex-arch-guardrail.sh 2>/dev/null || true

      # Run LLM-specific hooks
      if [ -f "scripts/llm/hooks/post-write-test-suggestion.sh" ]; then
        ./scripts/llm/hooks/post-write-test-suggestion.sh "$file_path" 2>/dev/null || true
      fi

      if [ -f "scripts/llm/hooks/post-write-doc-reminder.sh" ]; then
        ./scripts/llm/hooks/post-write-doc-reminder.sh "$file_path" 2>/dev/null || true
      fi

      exit 0

  - path: hooks/before-shell-execution.sh
    type: file
    content: |
      #!/usr/bin/env bash
      # Cursor before-shell-execution hook
      # Blocks dangerous commands before execution
      # Outputs JSON with permission decision (Cursor expects stdout JSON, not stderr text)

      set -euo pipefail

      # Read JSON input from stdin
      input=$(cat)
      command=$(echo "$input" | jq -r '.command // empty' 2>/dev/null || echo "")

      if [[ -z "$command" ]]; then
        echo '{"permission": "allow"}'
        exit 0
      fi

      # List of dangerous commands to block
      dangerous_commands=(
        "rm -rf /" "dd if=" "mkfs" ":(){:|:&};:" "chmod -R 777"
        "chown -R" "curl | sh" "wget | sh" "> /dev/sd" "> /dev/hd"
      )

      for dangerous in "${dangerous_commands[@]}"; do
        if [[ "$command" == *"$dangerous"* ]]; then
          jq -n \
            --arg cmd "$command" \
            --arg reason "dangerous pattern detected" \
            '{permission: "deny", user_message: "Command blocked for safety: \($cmd)", agent_message: "Hook blocked dangerous command: \($cmd) — \($reason)"}'
          exit 0
        fi
      done

      # Block writes to protected files
      protected_files=("go.mod" "go.sum" ".golangci.yml" "Taskfile")
      for protected in "${protected_files[@]}"; do
        if [[ "$command" == *"$protected"* ]] && [[ "$command" == *"rm"* ]] || [[ "$command" == *"mv"* ]]; then
          jq -n \
            --arg file "$protected" \
            '{permission: "deny", user_message: "Protected file modification blocked: \($file)", agent_message: "Use \u0027go mod tidy\u0027 for go.mod/go.sum, or task/config tools for other protected files."}'
          exit 0
        fi
      done

      echo '{"permission": "allow"}'
      exit 0

  - path: hooks/before-submit-prompt.sh
    type: file
    content: |
      #!/usr/bin/env bash
      # Pre-user-prompt hook: Inject architecture, performance, and security context
      # Fires once per user interaction before LLM begins reasoning

      echo "=== PROJECT CONTEXT ==="
      echo "Architecture: Hexagonal (Ports & Adapters). Dependencies point inward."
      echo "  - core/domain/: pure business logic, zero internal imports"
      echo "  - core/ports/: interfaces only, depends on domain"
      echo "  - core/services/: use cases, depends on domain + ports"
      echo "  - adapter/: infrastructure implementations (DB, HTTP, APIs)"
      echo ""
      echo "Performance: Consider goroutines/channels for I/O-bound operations."
      echo "  - Use errgroup for bounded concurrency"
      echo "  - Pass context.Context through full call chain"
      echo "  - Benchmark critical paths before optimizing"
      echo ""
      echo "Security: Validate all inputs. Wrap errors with %w. No hardcoded secrets."
      echo "  - Use os.Getenv or secure config loader"
      echo "  - No sensitive data in logs (passwords, tokens, PII)"
      echo "  - Parameterise SQL queries — no string concatenation"
      echo ""
      echo "Before outputting code, verify:"
      echo "  1. No adapter imports in core/domain/ or core/ports/"
      echo "  2. Errors checked and wrapped with %w"
      echo "  3. Tests would catch logic bugs (assert outputs, not just nil errors)"
      echo "  4. Functions ≤4 parameters where possible"
      echo "  5. No magic numbers — use named constants"
      echo "=== END CONTEXT ==="

      exit 0

  - path: hooks/after-agent-response.sh
    type: file
    content: |
      #!/usr/bin/env bash
      # Post-response hook: Format all modified Go files after agent response

      set -euo pipefail

      ROOT="$(cd "$(dirname "$0")/../../.." && pwd)"
      cd "$ROOT"

      # Find modified Go files and format them
      git diff --name-only --diff-filter=M 2>/dev/null | grep '\.go$' | while read -r f; do
        if [[ -f "$f" ]]; then
          golangci-lint run --fix --disable=gocyclo,gocognit,funlen,dupl,testableexamples --config .golangci.yml "$f" 2>/dev/null || true
        fi
      done

      exit 0

  - path: hooks/session-start.sh
    type: file
    content: |
      #!/usr/bin/env bash
      # Cursor session-start hook
      # Initializes session with environment variables

      set -euo pipefail

      ROOT="$(cd "$(dirname "$0")/../../.." && pwd)"
      cd "$ROOT"

      # Read JSON input from stdin
      input=$(cat)

      # Parse session info from input
      session_id=$(echo "$input" | jq -r '.session_id // empty' 2>/dev/null || echo "")
      composer_mode=$(echo "$input" | jq -r '.composer_mode // empty' 2>/dev/null || echo "")

      # Set environment variables for this session
      echo "{\"env\": {\"PROJECT_ROOT\": \"$ROOT\"}}"

      # Add additional context for the session
      echo "{\"additional_context\": \"Working in Go project with Hexagonal Architecture. Follow AGENTS.md for guidelines.\"}"

      exit 0
