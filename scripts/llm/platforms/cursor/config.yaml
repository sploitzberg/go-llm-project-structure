  - path: hooks/before-read-file.sh
    type: file
    content: |
      #!/usr/bin/env bash
      # Cursor before-read-file hook
      # Injects architecture context before LLM reads code

      set -euo pipefail

      ROOT="$(cd "$(dirname "$0")/../../.." && pwd)"
      cd "$ROOT"

      # Read JSON input from stdin
      input=$(cat)

      # Parse file path from input
      file_path=$(echo "$input" | jq -r '.file_path // empty' 2>/dev/null || echo "")

      if [[ -z "$file_path" ]]; then
        exit 0
      fi

      # Run context injection
      if [ -f "scripts/llm/hooks/pre-read-context-injection.sh" ]; then
        ./scripts/llm/hooks/pre-read-context-injection.sh "$file_path" 2>/dev/null || true
      fi

      # Run layer awareness
      if [ -f "scripts/llm/hooks/pre-read-layer-awareness.sh" ]; then
        ./scripts/llm/hooks/pre-read-layer-awareness.sh "$file_path" 2>/dev/null || true
      fi

      exit 0

  - path: hooks/before-file-edit.sh
    type: file
    content: |
      #!/usr/bin/env bash
      # Cursor before-file-edit hook
      # Pre-write validation hook (parity with Windsurf pre_write_code)
      # Runs fast blocking linters before code is written

      set -euo pipefail

      ROOT="$(cd "$(dirname "$0")/../../.." && pwd)"
      cd "$ROOT"

      # Read JSON input from stdin
      input=$(cat)

      # Parse file path from input
      file_path=$(echo "$input" | jq -r '.file_path // empty' 2>/dev/null || echo "")

      if [[ -z "$file_path" ]]; then
        exit 0
      fi

      # Check if file is a Go file
      if [[ "$file_path" != *.go ]]; then
        exit 0
      fi

      # Block writes to protected files
      protected_files=(
        "go.mod"
        "go.sum"
        ".golangci.yml"
        "Taskfile"
      )

      for protected in "${protected_files[@]}"; do
        if [[ "$(basename "$file_path")" == "$protected" ]]; then
          echo "error: Protected file: $file_path"
          echo "This file should not be modified directly."
          echo "Use 'go mod tidy' for go.mod/go.sum instead."
          exit 2
        fi
      done

      # Check if file is in core/domain/ and would violate purity
      if [[ "$file_path" == internal/core/domain/* ]]; then
        echo "info: Writing to core/domain/ - ensure no internal dependencies"
      fi

      # Run pre-write architecture compliance check
      if [ -f "scripts/llm/hooks/pre-write-arch-compliance.sh" ]; then
        ./scripts/llm/hooks/pre-write-arch-compliance.sh "$input" 2>/dev/null || true
      fi

      # Run fast blocking linters before write (depguard, gosec, errcheck)
      # These checks can block the write if violations are found
      golangci-lint run --disable-all --enable=depguard,gosec,errcheck --out-format=colored-line-number "$file_path" 2>&1 | head -20
      lint_exit=$?

      if [[ $lint_exit -ne 0 ]]; then
        echo "error: Pre-write linter checks failed. See output above."
        echo "Fix the issues before proceeding."
        exit 2
      fi

      exit 0

  - path: hooks/after-file-edit.sh
    type: file
    content: |
      #!/usr/bin/env bash
      # Cursor after-file-edit hook
      # Formats Go files and runs quality checks after edits
      # Disables expensive linters (complexity) to keep LLM fast

      set -euo pipefail

      ROOT="$(cd "$(dirname "$0")/../../.." && pwd)"
      cd "$ROOT"

      # Read JSON input from stdin
      input=$(cat)

      # Parse file path from input
      file_path=$(echo "$input" | jq -r '.file_path // empty' 2>/dev/null || echo "")

      if [[ -z "$file_path" ]] || [[ "$file_path" != *.go ]]; then
        exit 0
      fi

      # Format Go files using golangci-lint formatters
      # Disable expensive linters (complexity, duplication) for fast LLM iteration
      golangci-lint run --fix --disable=gocyclo,gocognit,funlen,dupl,testableexamples --config .golangci.yml "$file_path" 2>/dev/null || true

      # Run fast quality checks
      go vet "$file_path" 2>/dev/null || true

      # Run architecture guardrail on the specific file
      ./scripts/ci/hex-arch-guardrail.sh 2>/dev/null || true

      # Run LLM-specific hooks
      if [ -f "scripts/llm/hooks/post-write-test-suggestion.sh" ]; then
        ./scripts/llm/hooks/post-write-test-suggestion.sh "$file_path" 2>/dev/null || true
      fi

      if [ -f "scripts/llm/hooks/post-write-doc-reminder.sh" ]; then
        ./scripts/llm/hooks/post-write-doc-reminder.sh "$file_path" 2>/dev/null || true
      fi

      exit 0

  - path: hooks/before-shell-execution.sh
    type: file
    content: |
      #!/usr/bin/env bash
      # Cursor before-shell-execution hook
      # Blocks dangerous commands before execution

      set -euo pipefail

      ROOT="$(cd "$(dirname "$0")/../../.." && pwd)"
      cd "$ROOT"

      # Read JSON input from stdin
      input=$(cat)

      # Parse command from input
      command=$(echo "$input" | jq -r '.command // empty' 2>/dev/null || echo "")

      if [[ -z "$command" ]]; then
        exit 0
      fi

      # List of dangerous commands to block
      dangerous_commands=(
        "rm -rf /"
        "dd if="
        "mkfs"
        ":(){:|:&};:"
        "chmod -R 777"
        "chown -R"
        "curl | sh"
        "wget | sh"
        "> /dev/sd"
        "> /dev/hd"
      )

      # Check if command contains dangerous patterns
      for dangerous in "${dangerous_commands[@]}"; do
        if [[ "$command" == *"$dangerous"* ]]; then
          echo "error: Dangerous command blocked: $command" >&2
          exit 2
        fi
      done

      # Block writes to protected files
      protected_files=("go.mod" "go.sum" ".golangci.yml" "Taskfile")
      for protected in "${protected_files[@]}"; do
        if [[ "$command" == *"$protected"* ]] && [[ "$command" == *"rm"* ]] || [[ "$command" == *"mv"* ]]; then
          echo "error: Protected file modification blocked: $protected" >&2
          exit 2
        fi
      done

      exit 0

  - path: hooks/after-shell-execution.sh
    type: file
    content: |
      #!/usr/bin/env bash
      # Cursor after-shell-execution hook
      # Logs command execution results for audit trail

      set -euo pipefail

      ROOT="$(cd "$(dirname "$0")/../../.." && pwd)"
      cd "$ROOT"

      # Read JSON input from stdin
      input=$(cat)

      # Parse command and exit code from input
      command=$(echo "$input" | jq -r '.command // empty' 2>/dev/null || echo "")
      exit_code=$(echo "$input" | jq -r '.exit_code // 0' 2>/dev/null || echo "0")

      if [[ -z "$command" ]]; then
        exit 0
      fi

      # Log command execution
      if [[ $exit_code -ne 0 ]]; then
        echo "Command failed: $command (exit code: $exit_code)" >&2
      fi

      exit 0

  - path: hooks/before-submit-prompt.sh
