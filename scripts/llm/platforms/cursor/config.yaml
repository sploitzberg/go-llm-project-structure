      description: Core Hexagonal Architecture Rules
      globs: ["**/*.go"]
      alwaysApply: true
      ---

      # Core Hexagonal Architecture Rules (Always Apply)

      - `internal/core/domain/` must have **zero** internal imports
      - `core/services/` may only depend on `core/domain/` and `core/ports/`
      - Never import from `adapter/` in core layers
      - All infrastructure belongs in `adapter/`

  - path: rules/go-best-practices.mdc
    type: file
    content: |
      ---
      description: Go coding standards
      globs: ["**/*.go"]
      alwaysApply: false
      ---

      # Go Best Practices

      - Always run `gofmt -s` and `goimports`
      - Wrap errors with `%w`
      - Keep tests fast and focused

  # === Security Rules (New) ===
  - path: rules/security.mdc
    type: file
    content: |
      ---
      description: Security Best Practices
      globs: ["**/*.go"]
      alwaysApply: true
      ---

      # Security Rules (Always Apply)

      - Never hardcode credentials, API keys, or secrets
      - Use `os.Getenv` or a secure config loader (`internal/config`)
      - Always wrap errors with `%w` to avoid leaking sensitive information
      - Validate all user input and command-line arguments
      - Use `context.Context` for cancellation and deadlines
      - Prefer `github.com/google/uuid` over insecure random generators
      - Follow `gosec` findings (enabled in CI)
      - Do not log sensitive data (passwords, tokens, PII)

  # === Mosaic MCP Agent Rule ===
  - path: rules/mosaic-mcp-agent.mdc
    type: file
    content: |
      ---
      description: Mosaic MCP — HexxlaDB tool chaining and retrieval workflow for AI assistants
      alwaysApply: true
      ---

      # Mosaic MCP agent workflow

      Applies when reasoning about **mosaic** MCP tools (`cmd/mosaic-mcp`) backed by HexxlaDB.

      ## Getting the best results (read this first)

      ### Retrieval: typical pipeline

      1. **Pick entry points** — Use **`mosaic_hexxla_search_embedding`** when you need **semantic** "where on the lattice is this topic?" It returns **top‑K coords + text**, not full neighbourhoods.
      2. **Or use structured query** — **`mosaic_hexxla_query_cells`** for tags, time, radius, filters, optional **`embed_query_text`** (hybrid ANN + predicates). **`mosaic_hexxla_search_cells`** for **lexical** substring relevance (optional hybrid via **`embed_query_text`**).
      3. **Expand locally** — Take **1–3** `{q,r}` from those hits as **`seeds`** and call **`mosaic_hexxla_load_context_pack`** with a **modest** budget first (`max_ring`, `budget_tokens_approx` or `max_budget_bytes`). Increase rings/budget only if the answer is still incomplete.
      4. **Do not** stop at embedding hits alone when the user needs **adjacent** evidence, **seams**, or **supersession** — that is what the context pack is for.

      **Why this order:** Embedding finds **similar** cells globally; the context pack walks the **hex neighbourhood** from **known seeds** under a byte budget. Reversing (huge pack first) wastes tokens; skipping the pack leaves seams and neighbours invisible.

      ### Lexical vs semantic (avoid false "empty DB")

      | Goal | Tool |
      | ---- | ---- |
      | Phrase appears **literally** in stored text | **`mosaic_hexxla_search_cells`** |
      | **Meaning** match, synonyms, "like this topic" | **`mosaic_hexxla_search_embedding`** |
      | **Filters** + optional ANN | **`mosaic_hexxla_query_cells`** (+ **`embed_query_text`** when configured) |

      **Empty lexical hits are normal** if the exact phrase was never written; try **embedding** or broaden **`query`**. **Empty embedding** may mean no vectors or unrelated corpus — use **`mosaic_hexxla_health`** and tag browse to sanity‑check.

      ### User preferences and tagged slices

      - To load **preference‑style** cells, prefer **`mosaic_hexxla_query_cells`** with **`require_tags`** including **`preference`** (and `sort_by`, `max_results`) instead of a vague full‑text query alone.
      - **`mosaic_hexxla_list_tags`** / **`mosaic_hexxla_tag_counts`** help you **discover** taxonomy before searching or writing.

      ### Writes: taxonomy before `put_cell`

      1. Call **`mosaic_hexxla_list_tags`** (and often **`mosaic_hexxla_tag_counts`**) **before** **`mosaic_hexxla_put_cell`** when the DB taxonomy is unknown or you might invent a near‑duplicate tag.
      2. **Reuse** existing tags when they fit; only add new tags when nothing matches — keeps retrieval and reports consistent.
      3. Align **`source_id`** and **`kind`** with your persistence story (see persistence policy / config).

      ### Turn persistence (when policy is "store every exchange")

      Mosaic **never** auto‑saves chat — persistence is **only** via explicit **`mosaic_hexxla_put_cell`** (and related tools). When your operator/product policy requires a **full transcript** of user and assistant turns, align YAML **`retention.capture_mode`** with that intent (see **`save_all_turns`** in [`docs/mosaic/PERSISTENCE_POLICY.md`](docs/mosaic/PERSISTENCE_POLICY.md)) and call **`mosaic_hexxla_get_persistence_policy`** if unsure what the server allows.

      **Mandatory sequence for that policy (one exchange = two writes):**

      1. **Receive** the user message (and any session / correlation ids your stack uses).
      2. **First persistence action** — **`mosaic_hexxla_put_cell`** with **`kind=user_message`**, **`raw_content`** = user text, stable **`source_id`** (e.g. session id), chosen **`(q,r)`** per project convention, tags as policy requires (reuse taxonomy via **`list_tags`** when needed).
      3. **Reason, retrieve, and generate** the assistant reply (retrieval pipeline above still applies).
      4. **Last persistence action before closing the turn** — **`mosaic_hexxla_put_cell`** with **`kind=assistant_response`**, same **`source_id`**, assistant text in **`raw_content`**, appropriate **`(q,r)`** / tags.

      Skipping step 2 or 4 when **`save_all_turns`** (or explicit "persist everything" policy) is in effect is a **policy failure**. If **`capture_mode`** is **`llm_curates`**, storage is **discretionary** — this subsection is **not** a mandate unless humans/operators override.

      **Editor note:** Cursor has **no** built‑in cross‑session Memories as of Cursor 3.0; durable context belongs in **your** store (e.g. Mosaic via MCP). Background: [Cursor 3.0 and external memory](https://omegamax.co/blog/cursor-removed-memories).

  - path: rules/mosaic_intelligent_reads.md
    type: file
    content: |
      ---
      description: Mosaic intelligent read patterns - choosing the right search tool and loading context
      trigger: always_on
      ---

      # Mosaic Intelligent Read Patterns

      **Tool selection:**

      - **Semantic search** - `mosaic_hexxla_search_embedding` for concept discovery (embeddings required)
      - **Structured query** - `mosaic_hexxla_query_cells` with tags/filters/time/spatial for precise retrieval
      - **Lexical search** - `mosaic_hexxla_search_cells` for exact text/keyword matching

      **Hybrid mode:** Set `embed_query_text` in query_cells or search_cells to combine ANN with filters/lexical.

      **Context loading:**

      After retrieval, check `retrieval_hint` field. If present, call `mosaic_hexxla_load_context_pack` with:

      - `seeds`: Array of `{q, r}` from hits (1-3 seeds)
      - `budget_tokens_approx`: Approximate LM tokens (default 4096)
      - `max_ring`: Hex rings from seeds (default 3)
      - `include_seams`: Include contradictions (default false)
      - `filter_superseded`: Exclude stale content (default false)

      **Budget estimation:** `mosaic_hexxla_estimate_context_budget_bytes` before loading.

      **Patterns:**

      - Preferences: `query_cells(require_tags=["preference"], sort_by="recency")`
      - Concept discovery: `search_embedding(query="natural language")`
      - Text lookup: `search_cells(query="exact phrase")`

      **Anti-patterns:**

      - ❌ Using search_embedding when you know exact tags (use query_cells)
      - ❌ Using query_cells without filters (too broad)
      - ❌ Loading context without seeds from prior search
      - ❌ Ignoring retrieval_hint in responses

  - path: rules/mosaic_intelligent_writes.md
    type: file
    content: |
      ---
      description: Mosaic intelligent write patterns - tag discovery and reuse before put_cell
      trigger: always_on
      ---

      # Mosaic Intelligent Write Patterns

      **Before put_cell, always:**

      1. **List tags** - `mosaic_hexxla_list_tags` + `mosaic_hexxla_tag_counts` to see vocabulary
      2. **Search** - `mosaic_hexxla_query_cells` / `mosaic_hexxla_search_cells` / `mosaic_hexxla_search_embedding` for existing content
      3. **Load context** - `mosaic_hexxla_load_context_pack` with seeds from hits
      4. **Decide:**
         - Exact match? Reuse
         - Similar but outdated? Mark superseded, create new
         - No relevant content? Create with existing tags
         - New concept? Create with minimal new tags

      **Tag rules:**

      - Prefer high-frequency tags from `tag_counts`
      - Use atomic tags, not compound (e.g., `["coordinate", "system"]` not `["coordinate_system"]`)
      - Only create new tags if concept is fundamentally different and will be reused
      - See `.cursor/rules/mosaic_tag_conventions.md` for detailed tagging guidelines

      **Anti-patterns:**

      - ❌ Creating cells without searching
      - ❌ Inventing tags without checking `list_tags`
      - ❌ Using generic tags when specific exist
      - ❌ Creating duplicates instead of reusing

  - path: rules/mosaic_tag_conventions.md
    type: file
    content: |
      ---
      description: Mosaic tag conventions for optimal retrieval - best practices for tagging cells
      trigger: always_on
      ---

      # Mosaic Tag Conventions

      **Principles:**

      - Specific over generic
      - Reuse existing tags (check `mosaic_hexxla_list_tags` first)
      - Compose, don't compound (use `["coordinate", "system"]` not `["coordinate_system"]`)
      - Think about retrieval: how will you search for this later?
      - Consistent lowercase casing
      - 3-7 tags typical, minimal but sufficient

      **Tag categories:**

      **Content quality:** fact, opinion, idea, noise, signal, important, preference, question, answer, note, example

      **Domain:** api, algorithm, database, ui, backend, frontend, devops, security, performance, testing

      **Technology:** go, python, javascript, typescript, rust, sql, http, json, yaml, xml

      **Concept:** coordinate, conversion, pathfinding, caching, authentication, encryption, compression, indexing, query, transaction

      **Lifecycle:** draft, review, approved, deprecated, archived, wip, final

      **Tagging patterns:**

      - Fact: `[content_quality, domain, technology, concept]`
      - Preference: `["preference", category, subcategory]`
      - Question: `["question", domain, concept]`
      - Answer: Match question tags + "answer"

      **Anti-patterns:**

      - ❌ Over-tagging (10+ tags)
      - ❌ Under-tagging (1-2 generic tags)
      - ❌ Compound tags (`["coordinate_conversion"]`)
      - ❌ Inconsistent casing
      - ❌ One-off tags that won't be reused

      **Before put_cell:**

      1. `mosaic_hexxla_list_tags()` - see available vocabulary
      2. `mosaic_hexxla_tag_counts()` - prefer high-frequency tags
      3. Only create new tag if concept is fundamentally different

  - path: rules/mosaic_mcp.mdc
    type: file
    content: |
      ---
      description: Mosaic MCP — HexxlaDB tool chaining and retrieval workflow for AI assistants
      alwaysApply: true
      ---

      # Mosaic MCP agent workflow

      Applies when reasoning about **mosaic** MCP tools (`cmd/mosaic-mcp`) backed by HexxlaDB.

      ## ALWAYS DO

      Adhere to the retention policy STRICTLY!, do not ask the user if they would like to keep their conversation history, just do what the policy states.

      ## Tool roles (short)

      | Tool                              | Role                                                                                                   |
      | --------------------------------- | ------------------------------------------------------------------------------------------------------ |
      | `mosaic_hexxla_health`            | DB integrity / layout / embedding options                                                              |
      | `mosaic_hexxla_search_embedding`  | **Semantic** top‑K (ANN) — entry points, not full neighbourhoods                                       |
      | `mosaic_hexxla_query_cells`       | **Structured** indexed query (tags, time, radius, sort, explain)                                       |
      | `mosaic_hexxla_search_cells`      | **Lexical** relevance search                                                                           |
      | `mosaic_hexxla_load_context_pack` | **Lattice-expanded** context from **seed coords** (rings + byte budget; optional seams / supersession) |

      ## Chaining (default expectation)

      1. **Discover** with embedding search and/or query/search cells as appropriate.
      2. Read **`retrieval_hint`** on embedding or cell-hit responses when present.
      3. If the user question needs **neighbouring turns**, **contradiction/supersession**, or **more than top‑K slices**, call **`mosaic_hexxla_load_context_pack`** with **`seeds`** = `{q,r}` from prior hits (tune `max_ring`, `max_tokens`).
      4. Prefer **`LoadContextPackFrom`** semantics for LLM prompts over inventing ad‑hoc "more searches" when the gap is **local context on the grid**, not global similarity.

      ## Primitive note

      `Tx.LoadContext` (raw ring walk, count cap) is **not** the same as Pack assembly — see `internal/adapter/secondary/hexxlastore/load_context_sketch.go`. Do not assume Mosaic exposes it unless a dedicated tool is added.

      ## Security / deployment

      - MCP is intended **localhost-only**; respect existing [`security.mdc`](security.mdc) (no secrets in logs, env-based config).
      - Do not suggest exposing the MCP HTTP server to untrusted networks without TLS and authentication.

      ## References

      - [`docs/mosaic/AGENT_QUICK_REFERENCE.md`](docs/mosaic/AGENT_QUICK_REFERENCE.md) — Quick reference for agents
      - [`docs/mosaic/PROJECT_INTEGRATION.md`](docs/mosaic/PROJECT_INTEGRATION.md) — How Mosaic is used in the development workflow

