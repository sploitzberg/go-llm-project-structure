    type: file
    content: |
      #!/usr/bin/env bash
      # Cursor pre-write hook
      # Validates code before it's written to disk

      ROOT="$(cd "$(dirname "$0")/../../.." && pwd)"
      cd "$ROOT"

      # Read JSON input from stdin
      input=$(cat)

      # Parse file path from cursor input
      file_path=$(echo "$input" | jq -r '.file_path // empty' 2>/dev/null || echo "")

      if [[ -z "$file_path" ]]; then
        echo '{"continue": true, "permission": "allow"}'
        exit 0
      fi

      # Check if file is a Go file
      if [[ "$file_path" != *.go ]]; then
        echo '{"continue": true, "permission": "allow"}'
        exit 0
      fi

      # Block writes to protected files
      protected_files=("go.mod" "go.sum" ".golangci.yml" "Makefile")

      for protected in "${protected_files[@]}"; do
        if [[ "$(basename "$file_path")" == "$protected" ]]; then
          echo "⚠️  Protected file: $file_path" >&2
          echo "This file should not be modified directly." >&2
          echo '{"continue": false, "permission": "deny", "reason": "Protected file"}'
          exit 0
        fi
      done

      # Check if file is in core/domain/ and would violate purity
      if [[ "$file_path" == internal/core/domain/* ]]; then
        echo "ℹ️  Writing to core/domain/ - ensure no internal dependencies" >&2
      fi

      echo '{"continue": true, "permission": "allow"}'
      exit 0

  - path: hooks/pre-run-command.sh
    type: file
    content: |
      #!/usr/bin/env bash
      # Cursor pre-run-command hook
      # Blocks dangerous commands before execution

      ROOT="$(cd "$(dirname "$0")/../../.." && pwd)"
      cd "$ROOT"

      # Read JSON input from stdin
      input=$(cat)

      # Parse command line from cursor input
      command_line=$(echo "$input" | jq -r '.command // empty' 2>/dev/null || echo "")

      if [[ -z "$command_line" ]]; then
        echo '{"continue": true, "permission": "allow"}'
        exit 0
      fi

      # List of dangerous commands to block
      dangerous_patterns=("rm -rf /" "rm -rf /home" "rm -rf /usr" "rm -rf /etc" "rm -rf /var" "dd if=" ":(){:|:&};:" "> /dev/sd" "mkfs." "git push --force" "git push -f" "chmod -R 777 /" "chown -R")

      # Check if command matches any dangerous pattern
      for pattern in "${dangerous_patterns[@]}"; do
        if [[ "$command_line" == *"$pattern"* ]]; then
          echo "⛔  Blocked dangerous command: $command_line" >&2
          echo '{"continue": false, "permission": "deny", "reason": "Dangerous command"}'
          exit 0
        fi
      done

      # Warn about potentially destructive commands
      warning_patterns=("rm -rf" "git push" "docker rm" "kubectl delete")

      for pattern in "${warning_patterns[@]}"; do
        if [[ "$command_line" == *"$pattern"* ]]; then
          echo "⚠️  Warning: Potentially destructive command: $command_line" >&2
        fi
      done

      echo '{"continue": true, "permission": "allow"}'
      exit 0

