      if [[ -z "$response" ]]; then
        exit 0
      fi

      # Log response length for analytics
      response_length=$(echo "$response" | wc -c)
      if [[ $response_length -gt 10000 ]]; then
        echo "info: Large response generated (${response_length} chars)" >&2
      fi

      exit 0

