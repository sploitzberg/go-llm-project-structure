    type: file
    content: |
      ---
      name: go-error-handling
      description: Validates Go error handling patterns
      ---

      # Go Error Handling Skill

      When reviewing or writing Go code:
      - Ensure all errors are checked and not ignored
      - Validate error wrapping with `%w` for context preservation
      - Check that error messages are informative and actionable
      - Recommend using `errors.Is` and `errors.As` for error comparison
      - Ensure errors are returned early when possible (fail fast)
      - Validate error types are appropriate for the domain
      - Check for proper error propagation through the call stack
      - Avoid returning wrapped errors at package boundaries
      - Use custom error types for domain-specific errors
      - Ensure error variables are exported for use by callers

  - path: skills/context-usage/SKILL.md
    type: file
    content: |
      ---
      name: go-context-usage
      description: Validates Go context.Context usage patterns
      ---

      # Go Context Usage Skill

      When reviewing or writing Go code:
      - Ensure context.Context is the first parameter in functions that need it
      - Validate context is not stored in struct fields
      - Check that context is not used as a value in struct fields
      - Ensure context is passed through the call chain properly
      - Validate context cancellation is checked with select statements
      - Ensure context is not nil when used
      - Check that context is not used in exported API signatures incorrectly
      - Validate context deadlines are set appropriately
      - Ensure context values are used sparingly and for request-scoped data
      - Check that context.WithValue is used for request-scoped metadata only

  - path: skills/concurrency/SKILL.md
    type: file
    content: |
      ---
      name: go-concurrency
      description: Validates Go concurrency patterns
      ---

      # Go Concurrency Skill

      When reviewing or writing Go code:
      - Validate goroutines are properly awaited (WaitGroup, channels)
      - Check for potential goroutine leaks
      - Ensure channels are closed correctly (by sender, not receiver)
      - Validate mutex usage (Lock/Unlock pairs, defer Unlock)
      - Check for data races in concurrent code
      - Ensure select statements have default cases where appropriate
      - Validate channel buffer sizes are appropriate
      - Check for proper error handling in goroutines
      - Ensure atomic operations are used where needed
      - Recommend using sync.Pool for object reuse
      - Validate that shared state is properly protected

