  - path: skills/error-handling/SKILL.md
    type: file
    content: |
      ---
      name: go-error-handling
      description: Validates Go error handling patterns
      ---

      # Go Error Handling Skill

      Errors in Go are values and must always be handled. Ignored errors hide bugs. Unwrapped errors lose context. This skill enforces idiomatic, informative Go error handling.

      <checklist>
      1. [ ] All errors checked — never `_ = someFunc()`
      2. [ ] Errors wrapped with `fmt.Errorf("...: %w", err)` to preserve context
      3. [ ] `errors.Is` / `errors.As` used for comparison — never string matching
      4. [ ] Errors returned early (fail fast, avoid deeply nested success paths)
      5. [ ] Domain errors are sentinel values (`var ErrNotFound = errors.New(...)`)
      6. [ ] Exported error variables for callers to compare against
      7. [ ] No error swallowing in goroutines
      8. [ ] Error messages are lowercase, no trailing punctuation (Go convention)
      </checklist>

      <examples>
      <example>BAD: `result, _ := repo.Find(id)` — error silently discarded</example>
      <example>BAD: `return fmt.Errorf("failed: %v", err)` — %v loses the error chain</example>
      <example>GOOD: `return fmt.Errorf("order service find: %w", err)` — %w preserves chain</example>
      <example>GOOD: `if errors.Is(err, ErrNotFound) { ... }` — type-safe comparison</example>
      </examples>

  - path: skills/context-usage/SKILL.md
    type: file
    content: |
      ---
      name: go-context-usage
      description: Validates Go context.Context usage patterns
      ---

      # Go Context Usage Skill

      `context.Context` enables cancellation, deadlines, and request-scoped values across API boundaries. Misuse causes goroutine leaks, uncancellable operations, and hidden coupling.

      <checklist>
      1. [ ] `context.Context` is the **first parameter** of every function that needs it
      2. [ ] Context is never stored in a struct field — pass it explicitly
      3. [ ] Context is passed through the full call chain to I/O operations
      4. [ ] `context.Background()` only used at program entry points or tests
      5. [ ] `context.WithValue` used only for request-scoped metadata, not config
      6. [ ] Cancellation checked in long-running loops: `select { case <-ctx.Done(): }`
      7. [ ] Context not nil when passed to functions
      </checklist>

      <examples>
      <example>BAD: `type Service struct { ctx context.Context }` — never store context in struct</example>
      <example>BAD: `func FindOrder(id string) error` — missing ctx for any I/O operation</example>
      <example>GOOD: `func FindOrder(ctx context.Context, id string) error`</example>
      </examples>

  - path: skills/concurrency/SKILL.md
    type: file
    content: |
      ---
      name: go-concurrency
      description: Validates Go concurrency patterns
      ---

      # Go Concurrency Skill

      Concurrency bugs are among the hardest to debug — they are often non-deterministic. This skill identifies goroutine leaks, data races, and unsafe shared state. Run `go test -race` to confirm findings.

      <checklist>
      1. [ ] All goroutines are awaited — `WaitGroup`, channel drain, or `errgroup`
      2. [ ] No goroutine leaks — goroutines can always be cancelled via context
      3. [ ] Channels closed by sender only, never receiver
      4. [ ] Mutex `Unlock` always deferred: `defer mu.Unlock()`
      5. [ ] No data races — shared state protected by mutex or channel
      6. [ ] `go test -race` passes
      7. [ ] Channel buffer sizes justified — unbuffered preferred for synchronisation
      8. [ ] Errors from goroutines collected and surfaced — not silently dropped
      9. [ ] `sync.Pool` considered for high-frequency allocations
      </checklist>

      <examples>
      <example>BAD: `go func() { process(item) }()` — goroutine not awaited, cannot be cancelled</example>
      <example>GOOD: `g.Go(func() error { return process(ctx, item) })` — errgroup with cancellation</example>
      <example>BAD: `mu.Lock(); doWork(); mu.Unlock()` — Unlock not deferred, panics lose lock</example>
      <example>GOOD: `mu.Lock(); defer mu.Unlock(); doWork()`</example>
      </examples>

