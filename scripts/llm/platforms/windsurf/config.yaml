  - path: hooks/pre-read.sh
    type: file
    content: |
      #!/usr/bin/env bash
      # Generic pre-read hook for Go files
      # Used by Windsurf and similar platforms

      ROOT="$(cd "$(dirname "$0")/../../.." && pwd)"
      cd "$ROOT"

      # Run Mosaic-specific context injection
      if [ -f ".windsurf/hooks/pre-read-mosaic-context.sh" ]; then
        ./.windsurf/hooks/pre-read-mosaic-context.sh "$1" 2>/dev/null || true
      fi

      # Run context injection
      if [ -f "scripts/llm/hooks/pre-read-context-injection.sh" ]; then
        ./scripts/llm/hooks/pre-read-context-injection.sh "$1" 2>/dev/null || true
      fi

      # Run layer awareness
      if [ -f "scripts/llm/hooks/pre-read-layer-awareness.sh" ]; then
        ./scripts/llm/hooks/pre-read-layer-awareness.sh "$1" 2>/dev/null || true
      fi

      exit 0

  - path: hooks/post-write.sh
    type: file
    content: |
      #!/usr/bin/env bash
      # Generic post-write hook for Go files
      # Used by Windsurf and similar platforms

      ROOT="$(cd "$(dirname "$0")/../../.." && pwd)"
      cd "$ROOT"

      file_path=$(echo "$1" | jq -r '.file_path // empty' 2>/dev/null || echo "")

      if [[ "$file_path" == *.go ]]; then
        # Format Go files
        gofmt -l -s -w "$file_path" 2>/dev/null || true
        goimports -l -w "$file_path" 2>/dev/null || true

        # Run fast quality checks
        go vet ./... 2>/dev/null || true
        ./scripts/ci/hex-arch-guardrail.sh 2>/dev/null || true
        ./scripts/ci/pre-commit/18-go-conventions.sh 2>/dev/null || true

        # Run LLM-specific hooks
        if [ -f "scripts/llm/hooks/post-write-test-suggestion.sh" ]; then
          ./scripts/llm/hooks/post-write-test-suggestion.sh "$1" 2>/dev/null || true
        fi

        if [ -f "scripts/llm/hooks/post-write-doc-reminder.sh" ]; then
          ./scripts/llm/hooks/post-write-doc-reminder.sh "$1" 2>/dev/null || true
        fi
      fi

      exit 0

  # === Mosaic Workflows ===
  - path: rules/mosaic-turn-persistence.md
    type: file
    content: |
      ---
      description: Mosaic turn persistence - save all conversation turns
      trigger: always_on
      ---

      # Mosaic Turn Persistence

      This project uses Mosaic for long-term memory and context retrieval. Per the retention policy configured in the Mosaic server (see config/config.yaml), ALL conversation turns MUST be persisted automatically.

      ## Retention Policy

      - **capture_mode**: save_all_turns
      - **enforcement**: true — server returns error for conflicting put_cell kinds

      ## Required Actions

      After EVERY exchange with the user:

      1. **User turn**: Call `mosaic_hexxla_put_cell(kind=user_message, source_id=session_id, tags=[...], raw_content=..., confidence=1.0, q, r)`
      2. **Assistant turn**: Call `mosaic_hexxla_put_cell(kind=assistant_response, source_id=session_id, tags=[...], raw_content=..., confidence=1.0, q, r)`

      Use the same `source_id` (session id) for both messages in the same exchange.

      ## Tag Hygiene

      - Include relevant topic-specific tags when calling put_cell
      - Reuse existing tags from `mosaic_hexxla_list_tags` when possible
      - Check `mosaic_hexxla_tag_counts` to prefer high-frequency tags
      - See `.windsurf/rules/mosaic_tag_conventions.md` for detailed tagging guidelines

      ## Never Ask Permission

      Do NOT ask the user if they want to save conversation history. Comply with the retention policy automatically.

      ## References

      - `docs/mosaic/AGENT_QUICK_REFERENCE.md` — Quick reference for agents
      - `docs/mosaic/PROJECT_INTEGRATION.md` — How Mosaic is used in the development workflow
      - `docs/mosaic_retention_compliance.md` — Retention policy compliance documentation

  - path: rules/mosaic_intelligent_reads.md
    type: file
    content: |
      ---
      description: Mosaic intelligent read patterns - choosing the right search tool and loading context
      trigger: always_on
      ---

      # Mosaic Intelligent Read Patterns

      **Tool selection:**

      - **Semantic search** - `mosaic_hexxla_search_embedding` for concept discovery (embeddings required)
      - **Structured query** - `mosaic_hexxla_query_cells` with tags/filters/time/spatial for precise retrieval
      - **Lexical search** - `mosaic_hexxla_search_cells` for exact text/keyword matching

      **Hybrid mode:** Set `embed_query_text` in query_cells or search_cells to combine ANN with filters/lexical.

      **Context loading:**

      After retrieval, check `retrieval_hint` field. If present, call `mosaic_hexxla_load_context_pack` with:

      - `seeds`: Array of `{q, r}` from hits (1-3 seeds)
      - `budget_tokens_approx`: Approximate LM tokens (default 4096)
      - `max_ring`: Hex rings from seeds (default 3)
      - `include_seams`: Include contradictions (default false)
      - `filter_superseded`: Exclude stale content (default false)

      **Budget estimation:** `mosaic_hexxla_estimate_context_budget_bytes` before loading.

      **Patterns:**

      - Preferences: `query_cells(require_tags=["preference"], sort_by="recency")`
      - Concept discovery: `search_embedding(query="natural language")`
      - Text lookup: `search_cells(query="exact phrase")`

      **Anti-patterns:**

      - ❌ Using search_embedding when you know exact tags (use query_cells)
      - ❌ Using query_cells without filters (too broad)
      - ❌ Loading context without seeds from prior search
      - ❌ Ignoring retrieval_hint in responses

  - path: rules/mosaic_intelligent_writes.md
    type: file
    content: |
      ---
      description: Mosaic intelligent write patterns - tag discovery and reuse before put_cell
      trigger: always_on
      ---

      # Mosaic Intelligent Write Patterns

      **Before put_cell, always:**

      1. **List tags** - `mosaic_hexxla_list_tags` + `mosaic_hexxla_tag_counts` to see vocabulary
      2. **Search** - `mosaic_hexxla_query_cells` / `mosaic_hexxla_search_cells` / `mosaic_hexxla_search_embedding` for existing content
      3. **Load context** - `mosaic_hexxla_load_context_pack` with seeds from hits
      4. **Decide:**
         - Exact match? Reuse
         - Similar but outdated? Mark superseded, create new
         - No relevant content? Create with existing tags
         - New concept? Create with minimal new tags

      **Tag rules:**

      - Prefer high-frequency tags from `tag_counts`
      - Use atomic tags, not compound (e.g., `["coordinate", "system"]` not `["coordinate_system"]`)
      - Only create new tags if concept is fundamentally different and will be reused
      - See `.windsurf/rules/mosaic_tag_conventions.md` for detailed tagging guidelines

      **Anti-patterns:**

      - ❌ Creating cells without searching
      - ❌ Inventing tags without checking `list_tags`
      - ❌ Using generic tags when specific exist
      - ❌ Creating duplicates instead of reusing

  - path: rules/mosaic_tag_conventions.md
    type: file
    content: |
      ---
      description: Mosaic tag conventions for optimal retrieval - best practices for tagging cells
      trigger: always_on
      ---

      # Mosaic Tag Conventions

      **Principles:**

      - Specific over generic
      - Reuse existing tags (check `mosaic_hexxla_list_tags` first)
      - Compose, don't compound (use `["coordinate", "system"]` not `["coordinate_system"]`)
      - Think about retrieval: how will you search for this later?
      - Consistent lowercase casing
      - 3-7 tags typical, minimal but sufficient

      **Tag categories:**

      **Content quality:** fact, opinion, idea, noise, signal, important, preference, question, answer, note, example

      **Domain:** api, algorithm, database, ui, backend, frontend, devops, security, performance, testing

      **Technology:** go, python, javascript, typescript, rust, sql, http, json, yaml, xml

      **Concept:** coordinate, conversion, pathfinding, caching, authentication, encryption, compression, indexing, query, transaction

      **Lifecycle:** draft, review, approved, deprecated, archived, wip, final

      **Tagging patterns:**

      - Fact: `[content_quality, domain, technology, concept]`
      - Preference: `["preference", category, subcategory]`
      - Question: `["question", domain, concept]`
      - Answer: Match question tags + "answer"

      **Anti-patterns:**

      - ❌ Over-tagging (10+ tags)
      - ❌ Under-tagging (1-2 generic tags)
      - ❌ Compound tags (`["coordinate_conversion"]`)
      - ❌ Inconsistent casing
      - ❌ One-off tags that won't be reused

      **Before put_cell:**

      1. `mosaic_hexxla_list_tags()` - see available vocabulary
      2. `mosaic_hexxla_tag_counts()` - prefer high-frequency tags
      3. Only create new tag if concept is fundamentally different

  - path: rules/mosaic_mcp.md
    type: file
    content: |
      ---
      description: Mosaic MCP — HexxlaDB tool chaining and retrieval workflow for AI assistants
      trigger: always_on
      ---

      # Mosaic MCP agent workflow

      Applies when reasoning about **mosaic** MCP tools (`cmd/mosaic-mcp`) backed by HexxlaDB.

      ## ALWAYS DO

      Adhere to the retention policy STRICTLY!, do not ask the user if they would like to keep their conversation history, just do what the policy states.

      ## Tool roles (short)

      | Tool                              | Role                                                                                                   |
      | --------------------------------- | ------------------------------------------------------------------------------------------------------ |
      | `mosaic_hexxla_health`            | DB integrity / layout / embedding options                                                              |
      | `mosaic_hexxla_search_embedding`  | **Semantic** top‑K (ANN) — entry points, not full neighbourhoods                                       |
      | `mosaic_hexxla_query_cells`       | **Structured** indexed query (tags, time, radius, sort, explain)                                       |
      | `mosaic_hexxla_search_cells`      | **Lexical** relevance search                                                                           |
      | `mosaic_hexxla_load_context_pack` | **Lattice-expanded** context from **seed coords** (rings + byte budget; optional seams / supersession) |

      ## Chaining (default expectation)

      1. **Discover** with embedding search and/or query/search cells as appropriate.
      2. Read **`retrieval_hint`** on embedding or cell-hit responses when present.
      3. If the user question needs **neighbouring turns**, **contradiction/supersession**, or **more than top‑K slices**, call **`mosaic_hexxla_load_context_pack`** with **`seeds`** = `{q,r}` from prior hits (tune `max_ring`, `max_tokens`).
      4. Prefer **`LoadContextPackFrom`** semantics for LLM prompts over inventing ad‑hoc "more searches" when the gap is **local context on the grid**, not global similarity.

      ## Primitive note

      `Tx.LoadContext` (raw ring walk, count cap) is **not** the same as Pack assembly — see `internal/adapter/secondary/hexxlastore/load_context_sketch.go`. Do not assume Mosaic exposes it unless a dedicated tool is added.

      ## Security / deployment

      - MCP is intended **localhost-only**; respect existing [`security.mdc`](security.mdc) (no secrets in logs, env-based config).
      - Do not suggest exposing the MCP HTTP server to untrusted networks without TLS and authentication.

      ## References

      - [`docs/mosaic/AGENT_QUICK_REFERENCE.md`](docs/mosaic/AGENT_QUICK_REFERENCE.md) — Quick reference for agents
      - [`docs/mosaic/PROJECT_INTEGRATION.md`](docs/mosaic/PROJECT_INTEGRATION.md) — How Mosaic is used in the development workflow

  - path: workflows/mosaic-save-turns.md
    type: file
    content: |
      ---
      description: Mosaic turn persistence workflow
      ---

      # Mosaic Save Turns Workflow

      ## When to Use

      After EVERY exchange with the user (both user message and assistant response).

      ## Steps

      1. **Save user message:**
         ```bash
         mosaic_hexxla_put_cell(
           kind=user_message,
           source_id=session_id,
           tags=[relevant, topic, tags],
           raw_content=user_message_text,
           confidence=1.0,
           q=hex_q,
           r=hex_r
         )
         ```

      2. **Generate assistant response**

      3. **Save assistant response:**
         ```bash
         mosaic_hexxla_put_cell(
           kind=assistant_response,
           source_id=session_id,
           tags=[relevant, topic, tags],
           raw_content=assistant_response_text,
           confidence=1.0,
           q=hex_q,
           r=hex_r
         )
         ```

      ## Important Notes

      - Use the same `source_id` (session id) for both messages
      - Include relevant topic-specific tags
      - Check `mosaic_hexxla_list_tags` before creating new tags
      - Never ask user for permission - comply automatically with retention policy

  - path: workflows/mosaic-intelligent-retrieval.md
    type: file
    content: |
      ---
      description: Workflow for intelligent context retrieval using Mosaic
      ---

      # Mosaic Intelligent Retrieval Workflow

      **Step 1: Choose search tool**

      - Semantic: `mosaic_hexxla_search_embedding(query)` for concept discovery
      - Structured: `mosaic_hexxla_query_cells(require_tags=[...])` for precise retrieval
      - Lexical: `mosaic_hexxla_search_cells(query="text")` for exact matches
      - Hybrid: Set `embed_query_text` in query_cells or search_cells

      **Step 2: Execute search**

      - Use appropriate parameters (max_results, tags, filters)
      - Set `explain: true` to understand why cells matched

      **Step 3: Check retrieval_hint**

      - Present? → Proceed to step 4
      - Not present? → Top-K hits sufficient, stop

      **Step 4: Load context pack**

      ```go
      mosaic_hexxla_load_context_pack(
          seeds=[{q,r} from hits],
          budget_tokens_approx=2048,
          max_ring=3,
          include_seams=false
      )
      ```

      **Step 5: Process and respond**

      - Review cells for relevance
      - Check for contradictions if seams included
      - Formulate response using retrieved context

      **Scenarios:**

      - API design: search_embedding → load_context
      - Preferences: query_cells(require_tags=["preference"])
      - Exact function: search_cells(query="function name")

  - path: workflows/mosaic-tag-reuse.md
    type: file
    content: |
      ---
      description: Workflow for intelligent tag discovery and reuse before writing cells
      ---

      # Mosaic Tag Reuse Workflow

      **Before put_cell:**

      1. **List tags** - `mosaic_hexxla_list_tags()` + `mosaic_hexxla_tag_counts()` to see vocabulary
      2. **Search** - `mosaic_hexxla_query_cells` / `mosaic_hexxla_search_cells` / `mosaic_hexxla_search_embedding` for existing content
      3. **Load context** - `mosaic_hexxla_load_context_pack(seeds=hits, budget_tokens_approx=2048)`
      4. **Decide:**
         - Exact match? Reuse
         - Similar but outdated? Mark superseded, create new
         - No relevant content? Create with existing tags
         - New concept? Create with minimal new tags
      5. **Write** - `mosaic_hexxla_put_cell(kind, raw_content, source_id, confidence, tags, q, r)`

      **Critical rules:**

      - ALWAYS check existing tags before creating new ones
      - ALWAYS search for existing content before writing
      - PREFER high-frequency tags over new ones
      - AVOID duplicate content - reuse or supersede
      - USE specific tags, not generic
      - COMBINE existing tags instead of creating compound tags

  - path: workflows/review.md
    type: file
    content: |
      ---
      auto_execution_mode: 0
      description: Review code changes for bugs, security issues, and improvements
      ---

      # Code Review Workflow

      You are a senior software engineer performing a thorough code review to identify potential bugs.

      Your task is to find all potential bugs and code improvements in the code changes. Focus on:

      1. Logic errors and incorrect behavior
      2. Edge cases that aren't handled
      3. Null/undefined reference issues
      4. Race conditions or concurrency issues
      5. Security vulnerabilities
      6. Improper resource management or resource leaks
      7. API contract violations
      8. Incorrect caching behavior, including cache staleness issues, cache key-related bugs, incorrect cache invalidation, and ineffective caching
      9. Violations of existing code patterns or conventions

      Make sure to:

      1. If exploring the codebase, call multiple tools in parallel for increased efficiency. Do not spend too much time exploring.
      2. If you find any pre-existing bugs in the code, you should also report those since it's important for us to maintain general code quality for the user.
      3. Do NOT report issues that are speculative or low-confidence. All your conclusions should be based on a complete understanding of the codebase.
      4. Remember that if you were given a specific git commit, it may not be checked out and local code states may be different.

