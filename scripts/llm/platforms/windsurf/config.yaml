    content: |
      ---
      auto_execution_mode: 0
      description: Review code changes for bugs, security issues, and improvements
      ---

      # Code Review Workflow

      You are a senior Go engineer performing a thorough code review. You focus on correctness, architecture compliance, idiomatic Go, and security. You are direct — every finding includes file, line, issue, and a specific suggested fix. Do not soften or speculate.

      <investigate_before_answering>
      Read all referenced files before forming conclusions. Never report speculative issues. All findings must be backed by evidence in the actual code. If given a git commit, check whether it is currently checked out before making claims about local state.
      </investigate_before_answering>

      <use_parallel_tool_calls>
      When exploring the codebase, call multiple read tools in parallel. Read all relevant files simultaneously rather than sequentially to maximise efficiency.
      </use_parallel_tool_calls>

      <review_checklist>
      Work through this checklist. For each item: PASS or FAIL. For failures, quote the offending line and suggest the fix.

      **Hexagonal Architecture:**
      1. [ ] No `adapter/` imports in `core/domain/`, `core/ports/`, or `core/services/`
      2. [ ] `core/services/` only depends on `core/domain/` and `core/ports/`
      3. [ ] No business logic in adapter layer
      4. [ ] Port interfaces return domain types, not infrastructure types

      **Go Correctness:**
      5. [ ] All errors checked and wrapped with `%w`
      6. [ ] No `panic()` in production code
      7. [ ] No `init()` functions
      8. [ ] `context.Context` is first parameter where applicable; never stored in structs
      9. [ ] Goroutines awaited; no goroutine leaks
      10. [ ] `go test -race` would pass (no data races on shared state)

      **Code Quality:**
      11. [ ] Functions have ≤4 parameters
      12. [ ] No magic numbers — named constants used
      13. [ ] Interfaces are small and focused (1–3 methods)
      14. [ ] No unnecessary abstractions for one-time operations

      **Security:**
      15. [ ] No hardcoded secrets, API keys, or credentials
      16. [ ] No sensitive data in logs
      17. [ ] User input validated before use

      **Tests:**
      18. [ ] Tests assert specific values — not just `err == nil`
      19. [ ] Error paths have test coverage
      20. [ ] Pre-existing bugs reported if found
      </review_checklist>

      Report findings grouped by severity: **Critical** (bugs/security) → **Architecture** → **Quality** → **Minor**.

  - path: workflows/complexity-aware-coding.md
    type: file
    content: |
      ---
      description: Write complexity-aware code respecting hexagonal architecture thresholds
      ---

      # Complexity-Aware Coding Workflow

      You are writing Go code for a production-grade hexagonal architecture project. This workflow ensures your code respects complexity guardrails and maintains semantic stability.

      ## Complexity Thresholds by Layer

      Before writing code, check the layer you're working in and respect these limits:

      | Layer | Cyclomatic Max | Cognitive Max | Rationale |
      |-------|---------------|---------------|-----------|
      | `core/domain/` | 5 | 10 | Pure business logic, must be simple and focused |
      | `core/ports/` | 3 | 5 | Interface definitions, minimal logic |
      | `core/services/` | 10 | 15 | Orchestration allowed, but keep manageable |
      | `adapter/primary/` | 15 | 20 | HTTP handlers, CLI — external concerns |
      | `adapter/secondary/` | 12 | 18 | Database, API clients — external integrations |

      ## Before Writing Code

      1. **Identify the layer** - Determine which hexagonal layer you're working in
      2. **Review thresholds** - Check the max cyclomatic and cognitive complexity for that layer
      3. **Plan the function** - Design small, focused functions that stay within limits
      4. **Consider testability** - Complex code is hard to test with meaningful assertions

      ## While Writing Code

      **Keep functions small:**
      - Prefer single-responsibility functions
      - Extract complex logic into smaller helper functions
      - Avoid deeply nested conditions (use early returns instead)
      - Use guard clauses to reduce nesting

      **Prefer simple control flow:**
      - Replace nested if/else with early returns
      - Use switch statements for multiple conditions
      - Avoid deep nesting (max 3-4 levels)
      - Extract complex boolean logic into named functions

      **Domain layer specific:**
      - Keep business rules simple and declarative
      - Use value objects to encapsulate complex logic
      - Pure functions are easier to test and reason about
      - Aim for cyclomatic ≤ 5, cognitive ≤ 10

      **Services layer specific:**
      - Orchestrate, don't implement complex logic
      - Delegate complex operations to domain layer
      - Use composition over inheritance
      - Aim for cyclomatic ≤ 10, cognitive ≤ 15

      **Adapters specific:**
      - Translation logic can be moderately complex
      - Isolate external concerns from core logic
      - Use middleware for cross-cutting concerns
      - Aim for cyclomatic ≤ 12-15, cognitive ≤ 18-20

      ## After Writing Code

      1. **Run complexity check** - `./scripts/ci/pre-commit/19-complexity.sh` for changed files
      2. **If violations found:**
         - Refactor function into smaller pieces
         - Extract helper functions
         - Simplify control flow
         - Consider if logic belongs in a different layer

      3. **Check CRAP score** - Run `./scripts/ci/pre-push/05-complexity.sh` for full analysis
      4. **If CRAP is high:**
         - Improve test coverage with specific assertions
         - Add property-based tests for domain logic
         - Add contract tests for port implementations
         - Or refactor to reduce complexity

      ## Semantic Stability Considerations

      **High complexity = hard to test semantically:**
      - Complex code is difficult to write meaningful tests for
      - Mutation testing (gremlins) validates test effectiveness
      - Aim for high mutation score (80%+) on critical paths

      **When writing complex code:**
      - Add property-based tests for pure functions (domain layer)
      - Add contract tests for port interfaces
      - Write tests that assert specific behavior, not just execution
      - Consider invariants that should hold across inputs

      ## Examples

      **Bad (high complexity):**
      ```go
      func ProcessOrder(order Order, user User, inventory Inventory, payment Payment) error {
          if order.Status == "pending" {
              if user.Active {
                  if inventory.Available(order.Item) {
                      if payment.Valid() {
                          if payment.Amount >= order.Total {
                              // ... deeply nested logic
                          }
                      }
                  }
              }
          }
      }
      ```

      **Good (low complexity):**
      ```go
      func ProcessOrder(order Order, user User, inventory Inventory, payment Payment) error {
          if !order.IsPending() {
              return ErrInvalidOrderStatus
          }
          if !user.IsActive() {
              return ErrInactiveUser
          }
          if !inventory.Available(order.Item) {
              return ErrOutOfStock
          }
          if !payment.Valid() {
              return ErrInvalidPayment
          }
          if payment.Amount < order.Total {
              return ErrInsufficientFunds
          }
          return order.Complete()
      }
      ```

