  - path: hooks/pre-write.sh
    type: file
    content: |
      #!/usr/bin/env bash
      # Pre-write validation hook
      # Validates code before it's written to disk

      set -euo pipefail

      ROOT="$(cd "$(dirname "$0")/../../.." && pwd)"
      cd "$ROOT"

      # Read JSON input from stdin
      input=$(cat)

      # Parse file path from input
      file_path=$(echo "$input" | jq -r '.tool_info.file_path // empty' 2>/dev/null || echo "")

      if [[ -z "$file_path" ]]; then
        exit 0
      fi

      # Check if file is a Go file
      if [[ "$file_path" != *.go ]]; then
        exit 0
      fi

      # Block writes to protected files
      protected_files=(
        "go.mod"
        "go.sum"
        ".golangci.yml"
        "Makefile"
      )

      for protected in "${protected_files[@]}"; do
        if [[ "$(basename "$file_path")" == "$protected" ]]; then
          echo "⚠️  Protected file: $file_path"
          echo "This file should not be modified directly."
          echo "Use 'go mod tidy' for go.mod/go.sum instead."
          # Exit with code 2 to block the action
          exit 2
        fi
      done

      # Check if file is in core/domain/ and would violate purity
      if [[ "$file_path" == internal/core/domain/* ]]; then
        # Check if the edit would add imports from adapter/services/ports
        # This is a simplified check - in practice you'd parse the edits
        echo "ℹ️  Writing to core/domain/ - ensure no internal dependencies"
      fi

      exit 0

