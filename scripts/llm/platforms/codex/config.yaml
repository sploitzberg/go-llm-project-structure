  - path: hooks/pre-write.sh
    type: file
    content: |
      #!/usr/bin/env bash
      # Pre-write hook: architecture compliance
      set -euo pipefail
      ROOT="$(cd "$(dirname "$0")/../../.." && pwd)"
      cd "$ROOT"
      file_path=$(echo "$1" | jq -r '.file_path // empty' 2>/dev/null || echo "")
      if [[ "$file_path" == *.go ]]; then
        if [ -f "scripts/llm/hooks/pre-write-arch-compliance.sh" ]; then
          ./scripts/llm/hooks/pre-write-arch-compliance.sh "$1" 2>/dev/null || true
        fi
      fi
      exit 0

  - path: hooks/post-write.sh
    type: file
    content: |
      #!/usr/bin/env bash
      # Post-write hook: lint feedback
      set -euo pipefail
      ROOT="$(cd "$(dirname "$0")/../../.." && pwd)"
      cd "$ROOT"
      file_path=$(echo "$1" | jq -r '.file_path // empty' 2>/dev/null || echo "")
      if [[ "$file_path" == *.go ]]; then
        if [ -f "scripts/llm/hooks/post-write-lint.sh" ]; then
          ./scripts/llm/hooks/post-write-lint.sh "$1" 2>/dev/null || true
        fi
      fi
      exit 0
