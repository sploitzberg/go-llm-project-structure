# Taskfile for Go Project Bootstrap CLI
# Replaces Makefile with Task (https://taskfile.dev)

version: "3"

vars:
  BINARY_NAME: go-llm-project-structure
  GOOS:
    sh: go env GOOS
  GOARCH:
    sh: go env GOARCH


tasks:
  default:
    desc: Run the core CI pipeline used by GitHub Actions
    cmds:
      - task: ci

  build:
    desc: Build the CLI binary for host OS
    vars:
      BINDIR: "bin/{{.GOOS}}-{{.GOARCH}}"
      EXE: '{{if eq .GOOS "windows"}}.exe{{end}}'
    cmds:
      - mkdir -p {{.BINDIR}}
      - GOOS={{.GOOS}} GOARCH={{.GOARCH}} go build -ldflags="-s -w" -o {{.BINDIR}}/{{.BINARY_NAME}}{{.EXE}} ./cmd/go-llm-project-structure
      - echo "  → {{.BINDIR}}/{{.BINARY_NAME}}{{.EXE}}"

  build-linux:
    desc: Cross-compile for linux/amd64
    vars:
      GOOS: linux
      GOARCH: '{{.GOARCH | default "amd64"}}'
    cmds:
      - task: build
        vars:
          GOOS: "{{.GOOS}}"
          GOARCH: "{{.GOARCH}}"

  build-darwin:
    desc: Cross-compile for darwin/amd64
    vars:
      GOOS: darwin
      GOARCH: '{{.GOARCH | default "amd64"}}'
    cmds:
      - task: build
        vars:
          GOOS: "{{.GOOS}}"
          GOARCH: "{{.GOARCH}}"

  build-windows:
    desc: Cross-compile for windows/amd64
    vars:
      GOOS: windows
      GOARCH: '{{.GOARCH | default "amd64"}}'
    cmds:
      - task: build
        vars:
          GOOS: "{{.GOOS}}"
          GOARCH: "{{.GOARCH}}"

  build-all:
    desc: Cross-compile for linux/darwin/windows (amd64)
    cmds:
      - task: build-linux
      - task: build-darwin
      - task: build-windows
      - echo "==> Built all platforms into bin/"

  test:
    desc: Run tests
    cmds:
      - go test -race -count=1 ./...

  test-all:
    desc: Run both unit and integration tests
    cmds:
      - echo "Running unit tests..."
      - go test -race -count=1 ./...
      - echo ""
      - echo "Running integration tests..."
      - go test -race -count=1 -tags=integration ./...

  integration:
    desc: Run integration tests (slower, external dependencies)
    cmds:
      - go test -count=1 -race -tags=integration ./...

  benchmark:
    desc: Run benchmark tests
    cmds:
      - go test -bench=. -benchmem ./...

  sbom:
    desc: Generate Software Bill of Materials (SBOM)
    cmds:
      - sh -c "syft . -o spdx-json > sbom.json"

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run --timeout=5m

  workflow-lint:
    desc: Validate GitHub Actions workflows
    cmds:
      - actionlint



  fmt:
    desc: Format code (now handled by golangci-lint formatters)
    cmds:
      - golangci-lint run --fix

  ci:
    desc: Run the core CI pipeline used by GitHub Actions
    cmds:
      - ./scripts/ci/ci.sh

  test-guardrails:
    desc: Run regression tests for architecture and file-quality validators
    cmds:
      - ./scripts/test-validators.sh

  rename:
    desc: "Rename repository: task rename -- github.com/<owner>/<repo>"
    cmds:
      - ./scripts/setup/rename-repo.sh {{.CLI_ARGS}}

  install:
    desc: Install the CLI locally
    cmds:
      - go install ./cmd/go-llm-project-structure

  run:
    desc: Run the removable greeting CLI example
    cmds:
      - go run ./cmd/go-llm-project-structure {{.CLI_ARGS}}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin
      - go clean

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  tools:
    desc: Install the pinned tools required by local and hosted CI
    cmds:
      - bash scripts/setup/install-ci-tools.sh

  govulncheck:
    desc: Vulnerability scan only
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  update:
    desc: Update dependencies
    cmds:
      - go get -u ./...
      - go mod tidy

  mutation-test:
    desc: Full mutation testing (slow, thorough)
    vars:
      TARGET: internal/core/domain
    cmds:
      - ./scripts/ci/pre-push/check-gremlins.sh {{.TARGET}}

  mutation-test-dry:
    desc: Fast mutation dry-run (CI mode)
    vars:
      TARGET: internal/core/domain
    cmds:
      - ./scripts/ci/pre-push/check-gremlins-dry.sh {{.TARGET}}

  help:
    desc: Display available tasks
    cmds:
      - task --list
